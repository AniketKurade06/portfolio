  <main class="main-content container">
    <section class="reveal contact-split-section" style="padding-top: 100px;">
      <div class="contact-left">
        <h1 class="page-title" style="text-align: left; margin-bottom: 20px;">Let's Connect &
          <br /><span>Collaborate</span>
        </h1>
        <p class="contact-desc">Whether it's a new project or collaboration — I'd love to hear from you!</p>

        <div class="social-links-left">
          <a href="https://github.com/AniketKurade06" class="social-link" target="_blank" rel="noopener"
            aria-label="GitHub">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22">
              </path>
            </svg>
          </a>
          <a href="https://www.linkedin.com/in/aniket-kurade-ab979a336" class="social-link" target="_blank"
            rel="noopener" aria-label="LinkedIn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"></path>
              <rect x="2" y="9" width="4" height="12"></rect>
              <circle cx="4" cy="4" r="2"></circle>
            </svg>
          </a>
          <a href="mailto:aniketkurade653@gmail.com" class="social-link" aria-label="Email">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </a>
        </div>
      </div>

      <div class="contact-right">
        <form id="contact-form" class="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your Name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Your Email" required />
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" placeholder="Project Discussion" required />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" placeholder="Tell me about your project..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="align-center: flex-start;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polyline points="22 2 15 22 11 13 2 9 22 2"></polyline>
            </svg>
            Send Message
          </button>
        </form>
      </div>
    </section>

    <div class="footer-spacer"></div>
  </main>

  <script src="script.js"></script>
</body>

</html>
