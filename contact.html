      <p class="contact-desc">Whether it's a new project or collaboration — I'd love to hear from you!</p>

      <form class="contact-form">

        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea placeholder="Tell me about your project..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="align-self: center;">

            <polyline points="22 2 15 22 11 13 2 9 22 2"></polyline>
          </svg>

        </button>
      </form>
