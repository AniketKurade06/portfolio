  <script type="module">
    initParticles(document.getElementById('particles-bg'), {
      particleColors: ["#ffffff", "#8B5CF6", "#38BDF8"],
      particleCount: 500,
      particleSpread: 10,
      speed: 0.1,
      particleBaseSize: 5,
      moveParticlesOnHover: true,
      particleHoverFactor: 1.5,
      alphaParticles: false,
      sizeRandomness: 1,
      disableRotation: false
